# values.yaml

# Number of replicas for your deployment
replicaCount: 1

# Container image configuration
image:
  repository: deyibka03/gitops-demo   # Replace with your Docker image
  tag: latest
  pullPolicy: IfNotPresent

# Service configuration
service:
  type: LoadBalancer
  port: 80

# Service Account configuration
serviceAccount:
  create: true          # Create a ServiceAccount
  name: ""              # Leave blank to use default chart name

# Ingress configuration
ingress:
  enabled: false        # Set to true to enable ingress
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

# Pod annotations and labels
podAnnotations: {}
podLabels: {}

# Pod security context
podSecurityContext: {}

# Container security context
securityContext: {}

# Resources (CPU/memory)
resources: {}

# Autoscaling (optional)
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

# Liveness and readiness probes
livenessProbe:
  httpGet:
    path: /
    port: 80
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /
    port: 80
  initialDelaySeconds: 5
  periodSeconds: 10

# Volume mounts (optional)
volumeMounts: []

# Volumes (optional)
volumes: []

# Node selector, tolerations, and affinity (optional)
nodeSelector: {}
tolerations: []
affinity: {}
